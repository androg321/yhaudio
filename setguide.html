<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>장비 세팅 가이드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap");

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, sans-serif;
        background-color: #f8fafc;
        color: #0f172a;
        -webkit-tap-highlight-color: transparent;
      }

      .inner-card-convex {
        background: #ffffff;
        border-radius: 1.25rem;
        padding: 1.25rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05),
          0 2px 4px -1px rgba(0, 0, 0, 0.03);
        border: 1px solid #e2e8f0;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 1rem;
        width: 100%;
        text-align: left;
      }

      .inner-card-convex:active {
        transform: scale(0.98);
        background: #f1f5f9;
        box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      }

      .icon-box {
        width: 3rem;
        height: 3rem;
        border-radius: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .category-label {
        font-size: 0.7rem;
        font-weight: 800;
        letter-spacing: 0.05em;
        color: #64748b;
        text-transform: uppercase;
        margin-top: 2rem;
        margin-bottom: 0.75rem;
        padding-left: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .category-label::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #e2e8f0;
      }

      /* 모달 활성화 시 배경 스크롤 방지 */
      body.modal-open {
        overflow: hidden;
      }

      .fade-in {
        animation: fadeIn 0.4s ease-out forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* 스크롤바 숨기기 */
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body class="min-h-screen pb-32">
    <!-- 상단 네비게이션 -->
    <nav
      class="sticky top-0 bg-white/80 backdrop-blur-md border-b border-slate-200 z-40"
    >
      <div class="max-w-md mx-auto px-6 h-16 flex items-center justify-between">
        <a
          href="index.html"
          class="p-2 hover:bg-slate-100 rounded-full transition-colors"
        >
          <i data-lucide="arrow-left" class="w-5 h-5 text-slate-600"></i>
        </a>
        <h2 class="font-bold text-slate-900 text-sm tracking-tight">
          세팅 가이드 리스트
        </h2>
        <div class="w-9"></div>
      </div>
    </nav>

    <main class="w-full max-w-md mx-auto px-6 fade-in">
      <!-- S16 설정 그룹 -->
      <div class="category-label">S16 설정 방법</div>
      <div class="space-y-3">
        <button
          class="inner-card-convex"
          onclick="openSettingModal('s16_setup')"
        >
          <div class="icon-box bg-indigo-50 text-indigo-600">
            <i data-lucide="database" class="w-6 h-6"></i>
          </div>
          <div class="flex-1">
            <h4 class="font-bold text-slate-800 text-sm">S16 세팅하는 법</h4>
            <p class="text-[11px] text-slate-500">
              하드웨어 연결 및 믹서(X32) 설정
            </p>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
        </button>
      </div>

      <!-- 악기 연결 그룹 -->
      <div class="category-label">악기 연결 방법</div>
      <div class="space-y-3">
        <button
          class="inner-card-convex"
          onclick="openSettingModal('piano_setup')"
        >
          <div class="icon-box bg-rose-50 text-rose-600">
            <i data-lucide="music-4" class="w-6 h-6"></i>
          </div>
          <div class="flex-1">
            <h4 class="font-bold text-slate-800 text-sm">
              전자피아노 연결 가이드
            </h4>
            <p class="text-[11px] text-slate-500">
              메인/세컨/비트 피아노 DI Box 연결
            </p>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
        </button>

        <button
          class="inner-card-convex"
          onclick="openSettingModal('inst_diagram')"
        >
          <div class="icon-box bg-purple-50 text-purple-600">
            <i data-lucide="box" class="w-6 h-6"></i>
          </div>
          <div class="flex-1">
            <h4 class="font-bold text-slate-800 text-sm">신호 연결 흐름도</h4>
            <p class="text-[11px] text-slate-500">
              악기에서 믹서까지의 신호 변환 과정
            </p>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
        </button>
      </div>

      <!-- 방송 및 스피커 세팅 그룹 -->
      <div class="category-label">Broadcast & Speakers</div>
      <div class="space-y-3">
        <!-- 라이브 방송 -->
        <button
          class="inner-card-convex"
          onclick="openSettingModal('live_broadcast')"
        >
          <div class="icon-box bg-rose-50 text-rose-600">
            <i data-lucide="radio" class="w-6 h-6"></i>
          </div>
          <div class="flex-1">
            <h4 class="font-bold text-slate-800 text-sm">
              라이브 방송 소리 설정
            </h4>
            <p class="text-[11px] text-slate-500">
              오디오 인터페이스 연결 및 Matrix 루팅
            </p>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
        </button>

        <!-- 스피커 세팅 -->
        <button
          class="inner-card-convex"
          onclick="openSettingModal('speaker_setup')"
        >
          <div class="icon-box bg-purple-50 text-purple-600">
            <i data-lucide="speaker" class="w-6 h-6"></i>
          </div>
          <div class="flex-1">
            <h4 class="font-bold text-slate-800 text-sm">
              스피커 세팅 (모니터/메인)
            </h4>
            <p class="text-[11px] text-slate-500">
              사랑나눔주간 스피커 배치 가이드
            </p>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
        </button>
      </div>

      <!-- 모니터 시스템 그룹 -->
      <div class="category-label">Monitor System</div>
      <div class="space-y-3">
        <button
          class="inner-card-convex"
          onclick="openSettingModal('p16_setup')"
        >
          <div class="icon-box bg-cyan-50 text-cyan-600">
            <i data-lucide="headphones" class="w-6 h-6"></i>
          </div>
          <div class="flex-1">
            <h4 class="font-bold text-slate-800 text-sm">
              P16 개인 모니터 설정
            </h4>
            <p class="text-[11px] text-slate-500">
              Ultranet 연결 및 X32 루팅 방법
            </p>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
        </button>
      </div>

      <!-- 전원 그룹 -->
      <div class="category-label">System Power</div>
      <div class="space-y-3">
        <button
          class="inner-card-convex"
          onclick="openSettingModal('power_logic')"
        >
          <div class="icon-box bg-amber-50 text-amber-600">
            <i data-lucide="zap" class="w-6 h-6"></i>
          </div>
          <div class="flex-1">
            <h4 class="font-bold text-slate-800 text-sm">스피커 보호 가이드</h4>
            <p class="text-[11px] text-slate-500">
              팝 노이즈 방지를 위한 전원 순서
            </p>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
        </button>
      </div>
    </main>

    <!-- 모달 시스템 -->
    <div
      id="modal-container"
      class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4 sm:p-6 opacity-0 pointer-events-none transition-opacity duration-300"
    >
      <div
        class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"
        onclick="closeSettingModal()"
      ></div>
      <div
        id="modal-content"
        class="relative w-full max-w-md bg-white rounded-[2rem] p-6 shadow-2xl transform translate-y-10 scale-95 transition-all duration-300 border border-white/50"
      >
        <div
          id="modal-header"
          class="flex items-start justify-between mb-6"
        ></div>
        <div
          id="modal-body"
          class="space-y-4 max-h-[60vh] overflow-y-auto pr-2 pb-4 -mr-2 scrollbar-hide"
        ></div>
        <button
          onclick="closeSettingModal()"
          class="w-full mt-4 py-4 bg-slate-900 text-white font-bold rounded-2xl transition-all active:scale-[0.98]"
        >
          확인했습니다
        </button>
      </div>
    </div>

    <!-- 하단 복귀 버튼 -->
    <div class="fixed bottom-6 right-6 z-40">
      <a
        href="index.html"
        class="w-14 h-14 bg-slate-900 text-white rounded-full shadow-[0_10px_20px_rgba(0,0,0,0.3)] flex items-center justify-center active:scale-90 transition-all border border-white/10 ring-4 ring-white/10"
      >
        <i data-lucide="home" class="w-6 h-6"></i>
      </a>
    </div>

    <script>
      lucide.createIcons();

      const settingData = {
        s16_setup: {
          icon: "database",
          color: "bg-indigo-50 text-indigo-600",
          title: "S16 세팅 방법",
          html: `
            <div class="space-y-4">
              <div class="p-4 bg-indigo-50 rounded-2xl border border-indigo-100">
                <h4 class="text-xs font-black text-indigo-700 mb-2 uppercase">1. S16 하드웨어 연결</h4>
                <ul class="text-[11px] text-slate-600 space-y-1.5 leading-relaxed">
                  <li>• S16의 <strong>"AES50 A"</strong> 포트에 랜선을 연결하여 믹서(X32) <strong>"AES50 A"</strong>에 연결합니다.</li>
                  <li>• S16 디스플레이에 <strong>"1-8"</strong>이 되어 있는지 확인하세요.</li>
                  <li>• 원하는 번호에 악기들을 연결합니다.</li>
                </ul>
              </div>
              <div class="p-4 bg-slate-50 rounded-2xl border border-slate-200">
                <h4 class="text-xs font-black text-slate-800 mb-2 uppercase">2. 믹서 입력 설정 (Inputs)</h4>
                <ul class="text-[11px] text-slate-600 space-y-1.5 leading-relaxed">
                  <li>• 믹서 오른쪽의 <strong>ROUTING</strong> 버튼을 누릅니다.</li>
                  <li>• <strong>Input</strong> 탭에서 Local 1-8 설정을 <strong>AES50 A1-8, 9-16</strong>으로 변경합니다.</li>
                </ul>
              </div>
              <div class="p-4 bg-emerald-50 rounded-2xl border border-emerald-100">
                <h4 class="text-xs font-black text-emerald-700 mb-2 uppercase">3. 동기화 확인</h4>
                <ul class="text-[11px] text-slate-600 space-y-1.5 leading-relaxed">
                  <li>• Setup → Global 탭에서 Synchronization이 <strong>Internal</strong>인지 확인하세요.</li>
                  <li>• X32가 Master가 되고 S16이 Slave가 되어야 노이즈 없이 깨끗한 소리가 납니다.</li>
                </ul>
              </div>
            </div>
          `,
        },
        live_broadcast: {
          icon: "radio",
          color: "bg-rose-50 text-rose-600",
          title: "라이브 방송 소리 내보는 법",
          html: `
            <div class="space-y-4">
              <div class="p-4 bg-rose-50 rounded-2xl border border-rose-100">
                <h4 class="text-xs font-black text-rose-700 mb-2 uppercase">1. 물리적 연결</h4>
                <p class="text-[11px] text-slate-600 leading-relaxed">X32 뒷면의 남는 <strong>"Output 단자"</strong>를 오디오 인터페이스나 방송용 PC의 입력에 연결합니다.</p>
              </div>
              <div class="p-4 bg-slate-50 rounded-2xl border border-slate-200">
                <h4 class="text-xs font-black text-slate-800 mb-2 uppercase">2. 믹서 라우팅 설정</h4>
                <ul class="text-[11px] text-slate-600 space-y-1.5 leading-relaxed">
                  <li>• <strong>"ROUTING"</strong> 설정에서 연결한 Output 단자 번호에 소스를 <strong>Matrix 번호</strong>로 지정합니다.</li>
                  <li>• 콘솔 화면 오른쪽의 <strong>"Main Bus 페이더(가장 오른쪽)"</strong>를 선택(Select)합니다.</li>
                  <li>• 화면 옆의 <strong>[Sends]</strong> 탭으로 이동합니다.</li>
                  <li>• Matrix 채널로 가서 보내려는 Matrix의 페이더를 올립니다.</li>
                </ul>
              </div>
            </div>
          `,
        },
        speaker_setup: {
          icon: "speaker",
          color: "bg-purple-50 text-purple-600",
          title: "스피커 세팅 가이드",
          html: `
            <div class="space-y-4 text-left">
              <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                <h4 class="text-xs font-black text-blue-700 mb-2 uppercase">A. 모니터 스피커 세팅</h4>
                <ol class="text-[11px] text-slate-600 space-y-1.5 leading-relaxed list-decimal pl-4">
                  <li>스피커 뒷면 <strong>INPUT</strong>에 XLR(캐논) 케이블을 꽂습니다.</li>
                  <li>반대쪽을 S16 스테이지 박스의 <strong>OUTPUT 단자(1~6번)</strong>에 연결합니다.</li>
                  <li>파워 케이블을 연결하되, <strong>믹서 설정 완료 후 마지막에</strong> 전원을 켭니다.</li>
                </ol>
              </div>
              <div class="p-4 bg-purple-50 rounded-2xl border border-purple-100">
                <h4 class="text-xs font-black text-purple-700 mb-2 uppercase">B. 메인 스피커 (서브우퍼 + 탑)</h4>
                <ol class="text-[11px] text-slate-600 space-y-1.5 leading-relaxed list-decimal pl-4">
                  <li><strong>스탠딩:</strong> 서브우퍼 위에 연결 봉을 세우고 탑 스피커를 안전하게 결합합니다.</li>
                  <li><strong>스피커 간 연결:</strong> 스피콘(Speakon) 케이블로 두 스피커를 연결합니다.</li>
                  <li><strong>메인 신호:</strong> 입력을 담당하는 스피커 뒷면 <strong>INPUT</strong>에 XLR을 연결합니다.</li>
                  <li><strong>스테이지 박스:</strong> 케이블 반대쪽을 S16의 <strong>OUTPUT 7, 8번</strong>에 연결합니다.</li>
                  <li>전원을 연결하고 시스템의 가장 마지막에 켭니다.</li>
                </ol>
              </div>
            </div>
          `,
        },
        piano_setup: {
          icon: "music-4",
          color: "bg-rose-50 text-rose-600",
          title: "피아노 연결 가이드",
          html: `
            <div class="space-y-4">
              <div class="p-4 bg-rose-50 rounded-2xl border border-rose-100">
                <h4 class="text-xs font-black text-rose-700 mb-2 uppercase">메인 & 세컨 피아노 (Stereo)</h4>
                <ol class="text-[11px] text-slate-600 space-y-1.5 leading-relaxed list-decimal pl-4">
                  <li>전자피아노 Output L, R에 5.5mm 라인을 연결합니다.</li>
                  <li>라인 반대쪽을 <strong>DI Box "Input"</strong>에 각각 연결합니다.</li>
                  <li>XLR 케이블을 DI Box "Output"에서 <strong>S16 "Input"</strong>으로 연결합니다.</li>
                </ol>
              </div>
              <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                <h4 class="text-xs font-black text-slate-800 mb-2 uppercase">비트 피아노 (Mono)</h4>
                <ol class="text-[11px] text-slate-600 space-y-1.5 leading-relaxed list-decimal pl-4">
                  <li>전자피아노 Mono Output에 5.5mm 라인을 연결합니다.</li>
                  <li>라인 반대쪽을 <strong>DI Box "Input"</strong>에 연결합니다.</li>
                  <li>XLR 케이블을 DI Box "Output"에서 <strong>S16 "Input"</strong>으로 연결합니다.</li>
                </ol>
              </div>
              <div class="p-4 bg-amber-50 rounded-2xl border border-amber-100">
                <h4 class="text-xs font-black text-amber-700 mb-1 flex items-center gap-1.5">
                  <i data-lucide="alert-circle" class="w-3.5 h-3.5"></i> 팁: 소리가 너무 크다면?
                </h4>
                <p class="text-[11px] text-slate-600 leading-relaxed">
                  DI Box의 <strong>-20dB PAD</strong> 스위치를 눌러주세요.
                </p>
              </div>
            </div>
          `,
        },
        p16_setup: {
          icon: "headphones",
          color: "bg-cyan-50 text-cyan-600",
          title: "P16 모니터 설정",
          html: `
            <div class="space-y-4">
              <div class="p-4 bg-cyan-50 rounded-2xl border border-cyan-100">
                <h4 class="text-xs font-black text-cyan-700 mb-2 uppercase">1. 하드웨어 연결</h4>
                <ul class="text-[11px] text-slate-600 space-y-1.5 leading-relaxed">
                  <li>• P16-D의 <strong>"IN"</strong> 포트와 X32 뒷면의 <strong>ULTRANET</strong> 포트를 연결합니다.</li>
                  <li>• P16-D의 Out 1~8 포트에서 각 연주자의 P16 장비로 연결합니다.</li>
                </ul>
              </div>
              <div class="p-4 bg-slate-50 rounded-2xl border border-slate-200">
                <h4 class="text-xs font-black text-slate-800 mb-2 uppercase">2. X32에서 P16 세팅하는 법</h4>
                <ol class="text-[11px] text-slate-600 space-y-1.5 leading-relaxed list-decimal pl-4">
                  <li><strong>ROUTING</strong> 버튼을 누르고 화면에서 <strong>"P16"</strong> 탭으로 이동합니다.</li>
                  <li>P16 Out 1~16 리스트에서 각 번호에 원하는 소스를 할당합니다.</li>
                </ol>
                <div class="mt-3 p-3 bg-white rounded-xl border border-slate-100 shadow-sm">
                  <p class="text-[10px] font-black text-slate-400 uppercase mb-1">예시 세팅</p>
                  <ul class="text-[10px] text-slate-600 space-y-1">
                    <li>Output 01: Direct Out Ch 01 (보컬)</li>
                    <li>Output 02: Direct Out Ch 02 (신디 L)</li>
                    <li>Output 03: Direct Out Ch 03 (신디 R)</li>
                  </ul>
                </div>
              </div>
              <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                 <h4 class="text-xs font-black text-blue-700 mb-1 flex items-center gap-1.5">
                   <i data-lucide="info" class="w-3.5 h-3.5"></i> 3. 탭 포인트(Tap Point) 설정
                 </h4>
                 <p class="text-[11px] text-slate-600 leading-relaxed">
                   보통 <strong>Pre Fader</strong> 혹은 <strong>Post EQ</strong>로 설정합니다.
                 </p>
              </div>
            </div>
          `,
        },
        inst_diagram: {
          icon: "box",
          color: "bg-purple-50 text-purple-600",
          title: "악기 연결 신호 체인",
          html: `
            <div class="space-y-3">
              <div class="p-4 bg-purple-50 rounded-2xl border border-purple-100 text-center font-bold">
                <p class="text-[11px] text-slate-600 leading-relaxed">악기(TS) → DI BOX → 믹서(XLR)</p>
              </div>
              <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                <h4 class="text-xs font-black text-slate-800 mb-1">DI BOX 사용 이유</h4>
                <p class="text-[11px] text-slate-500 leading-relaxed">악기의 언밸런스 신호를 장거리 전송용 밸런스 신호로 변환합니다.</p>
              </div>
            </div>
          `,
        },
        power_logic: {
          icon: "zap",
          color: "bg-amber-50 text-amber-600",
          title: "전원 관리 원리",
          html: `
            <div class="p-4 bg-amber-50 rounded-2xl border border-amber-100">
              <h4 class="text-xs font-black text-amber-700 mb-2 italic">Pop Noise 주의</h4>
              <p class="text-[11px] text-slate-600 leading-relaxed">스피커 보호를 위해 전원 순서를 준수해야 합니다.</p>
            </div>
            <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 mt-3">
              <p class="text-[11px] text-slate-500 leading-relaxed"><strong>앰프/스피커</strong>는 켜기 마지막, 끄기 처음에 수행합니다.</p>
            </div>
          `,
        },
      };

      function openSettingModal(id) {
        const data = settingData[id];
        if (!data) return;

        const headerHTML = `
          <div class="flex items-center gap-4">
            <div class="icon-box ${data.color}">
              <i data-lucide="${data.icon}" class="w-6 h-6"></i>
            </div>
            <h3 class="text-lg font-bold text-slate-900 leading-tight">${data.title}</h3>
          </div>
          <button onclick="closeSettingModal()" class="p-2 text-slate-400 hover:bg-slate-100 rounded-full">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        `;
        document.getElementById("modal-header").innerHTML = headerHTML;
        document.getElementById("modal-body").innerHTML = data.html;
        lucide.createIcons();

        const container = document.getElementById("modal-container");
        const content = document.getElementById("modal-content");
        container.classList.remove("opacity-0", "pointer-events-none");
        container.classList.add("opacity-100", "pointer-events-auto");
        content.classList.remove("translate-y-10", "scale-95");
        content.classList.add("translate-y-0", "scale-100");
        document.body.classList.add("modal-open");
      }

      function closeSettingModal() {
        const container = document.getElementById("modal-container");
        const content = document.getElementById("modal-content");
        container.classList.remove("opacity-100", "pointer-events-auto");
        container.classList.add("opacity-0", "pointer-events-none");
        content.classList.remove("translate-y-0", "scale-100");
        content.classList.add("translate-y-10", "scale-95");
        document.body.classList.remove("modal-open");
      }
    </script>
  </body>
</html>
