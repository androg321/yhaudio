<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>장비 가이드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap");

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, sans-serif;
        background-color: #f8fafc;
        color: #0f172a;
        -webkit-tap-highlight-color: transparent;
      }

      .menu-card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05),
          0 2px 4px -1px rgba(0, 0, 0, 0.03);
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        padding: 1.25rem;
        border-radius: 1.25rem;
        text-decoration: none;
        color: inherit;
      }

      .menu-card:active {
        transform: scale(0.97);
        background: #f1f5f9;
        box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      }

      .gradient-text {
        background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .icon-box {
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s ease;
      }

      .menu-card:hover .icon-box {
        transform: scale(1.1);
      }
    </style>
  </head>
  <body class="min-h-screen flex flex-col items-center justify-start">
    <!-- 메인 컨테이너 -->
    <div class="w-full max-w-md px-6 py-16">
      <!-- 헤더 섹션 -->
      <header class="mb-12 text-center">
        <h1 class="text-4xl font-extrabold tracking-tight text-slate-900">
          <span class="gradient-text">예향 음향 장비 가이드</span>
        </h1>
      </header>

      <!-- 네비게이션 메뉴 -->
      <nav class="space-y-4">
        <!-- 1. 음향 케이블 설명 -->
        <a href="cable.html" class="menu-card group">
          <div class="flex items-center space-x-4">
            <div
              class="icon-box w-12 h-12 bg-blue-50 rounded-xl group-hover:bg-blue-100 transition-colors"
            >
              <i data-lucide="cable" class="w-6 h-6 text-blue-600"></i>
            </div>
            <div class="text-left">
              <h2 class="font-bold text-lg text-slate-800 leading-tight">
                음향 케이블 설명
              </h2>
              <p class="text-sm text-slate-500 mt-1">XLR, TRS 설명</p>
            </div>
          </div>
          <i
            data-lucide="chevron-right"
            class="w-5 h-5 text-slate-300 group-hover:text-blue-600 transition-colors"
          ></i>
        </a>

        <!-- 2. 장비 매뉴얼 -->
        <a href="equipment.html" class="menu-card group">
          <div class="flex items-center space-x-4">
            <div
              class="icon-box w-12 h-12 bg-purple-50 rounded-xl group-hover:bg-purple-100 transition-colors"
            >
              <i data-lucide="audio-lines" class="w-6 h-6 text-purple-600"></i>
            </div>
            <div class="text-left">
              <h2 class="font-bold text-lg text-slate-800 leading-tight">
                장비 매뉴얼
              </h2>
              <p class="text-sm text-slate-500 mt-1">파트별 장비 설명</p>
            </div>
          </div>
          <i
            data-lucide="chevron-right"
            class="w-5 h-5 text-slate-300 group-hover:text-purple-600 transition-colors"
          ></i>
        </a>

        <!-- 3. 세팅 미리보기 -->
        <a href="settings.html" class="menu-card group">
          <div class="flex items-center space-x-4">
            <div
              class="icon-box w-12 h-12 bg-emerald-50 rounded-xl group-hover:bg-emerald-100 transition-colors"
            >
              <i
                data-lucide="layout-dashboard"
                class="w-6 h-6 text-emerald-600"
              ></i>
            </div>
            <div class="text-left">
              <h2 class="font-bold text-lg text-slate-800 leading-tight">
                세팅 미리보기
              </h2>
              <p class="text-sm text-slate-500 mt-1">장비 연결 다이어그램</p>
            </div>
          </div>
          <i
            data-lucide="chevron-right"
            class="w-5 h-5 text-slate-300 group-hover:text-emerald-600 transition-colors"
          ></i>
        </a>
      </nav>
    </div>

    <script>
      // Lucide 아이콘 초기화
      lucide.createIcons();
    </script>
  </body>
</html>
